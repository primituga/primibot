version: "3.9"

services:
  # --- Local LLM Engine ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./volumes/ollama:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=1m
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_FS_SYNC=1
    # Enable NVIDIA GPU Support (Requires NVIDIA Container Toolkit installed on the host)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - primibot-network

  # --- Local Web Search Engine ---
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
      - SEARXNG_SETTINGS_URL=/etc/searxng/settings.yml
      - INSTANCE_NAME=searxng
      - SEARXNG_OUTGOING_FORMATS=json,plaintext
      - SEARXNG_UPDATE_SETTINGS=false
      - VALUE_SECRET=replace_this_with_a_secure_secret_key
    volumes:
      - ./volumes/searxng:/etc/searxng
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - primibot-network

  # --- Web UI for Local LLMs (Optional) ---
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      - ollama
      - searxng
    ports:
      - "3001:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=False
      - WEBUI_NAME=PrimiBot AI
      - ENABLE_RAG_WEB_SEARCH=True
      - RAG_WEB_SEARCH_ENGINE=searxng
      - RAG_WEB_SEARCH_RESULT_COUNT=8
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json
    volumes:
      - ./volumes/open-webui:/app/backend/data
    networks:
      - primibot-network

  # --- Visual AI Workflow Builder ---
  flowise:
    image: flowiseai/flowise:latest
    container_name: flowise
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - ollama
      - searxng
    environment:
      - FLOWISE_USERNAME=${FLOWISE_USERNAME:-admin}
      - FLOWISE_PASSWORD=${FLOWISE_PASSWORD:-admin}
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./volumes/flowise:/root/.flowise
    networks:
      - primibot-network

  # --- Memory Database ---
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - primibot-network
      
  # --- The Brain (Our Custom Bot) ---
  agent:
    image: python:3.11-slim
    container_name: langchain-agent
    working_dir: /app
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Maps the local 'langchain-agent' folder to the container's '/app' folder
      - ./langchain-agent:/app
    env_file:
      - .env
    command: bash -c "pip install --no-cache-dir -r requirements.txt && python agent.py"
    depends_on:
      - ollama
      - searxng
      - flowise
      - redis
    stdin_open: true
    tty: true
    networks:
      - primibot-network

networks:
  primibot-network:
    driver: bridge
